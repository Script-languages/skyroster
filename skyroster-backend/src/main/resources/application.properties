spring.application.name=skyroster-backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:skyroster}
spring.datasource.username=${DB_USERNAME:skyroster}
spring.datasource.password=${DB_PASSWORD:skyroster}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true

# Security
#spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/skyroster
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/skyroster/protocol/openid-connect/certs
logging.level.org.springframework.security=DEBUG

# CORS
app.cors.allowed-origins=http://localhost:5173
