openapi: 3.0.3
info:
  title: SkyRoster API
  description: Pilot schedule conflict detection system
  version: 0.1.0

security:
  - bearerAuth: [ ]

paths:
  /api/health:
    get:
      operationId: getHealth
      tags: [ Health ]
      summary: Health check
      security: [ ]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /api/me:
    get:
      operationId: getCurrentUser
      tags: [ User ]
      summary: Get current authenticated user info
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/compliance/reports:
    get:
      operationId: getComplianceReports
      tags: [ Compliance ]
      summary: List compliance reports
      responses:
        '200':
          description: List of compliance reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComplianceReport'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/planning/schedules:
    get:
      operationId: getPlanningSchedules
      tags: [ Planning ]
      summary: List schedules
      responses:
        '200':
          description: List of schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Schedule'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/aircraft:
    post:
      operationId: addAircraft
      tags: [ Aircraft ]
      summary: Add a new aircraft to the fleet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAircraftRequest'
      responses:
        '201':
          description: Aircraft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AircraftResponse'
        '400':
          description: Bad request (invalid type or base)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Aircraft with this registration already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: getAircraft
      tags: [ Aircraft ]
      summary: List all aircraft in the fleet
      responses:
        '200':
          description: List of aircraft
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AircraftResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/aircraft/availability:
    get:
      operationId: getAvailableAircraft
      tags: [ Aircraft ]
      summary: List aircraft available in a given time window
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date-time
          description: Window start (ISO offset datetime)
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date-time
          description: Window end (ISO offset datetime)
        - in: query
          name: baseId
          required: false
          schema:
            type: string
            format: uuid
          description: Optional filter by operational base
      responses:
        '200':
          description: List of available aircraft
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AircraftResponse'
        '400':
          description: Bad request (e.g. from >= to)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/pilots:
    get:
      tags:
        - Pilots
      operationId: getPilots
      summary: Get paginated list of pilots
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort
          in: query
          required: false
          schema:
            type: string
            example: surname,asc
      responses:
        '200':
          description: Paginated list of pilots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedPilotResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Pilots
      summary: Add a new pilot
      description: Creates a new pilot in the system.
      operationId: createPilot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PilotRequest'
      responses:
        '201':
          description: Pilot created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PilotResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Pilot already exists, for example duplicate license number or email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/pilots/availability:
    get:
      operationId: getAvailablePilots
      tags: [ Pilots ]
      summary: List pilots available in a given time window with optional aircraft type qualification
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: aircraftTypeId
          required: false
          schema:
            type: string
            format: uuid
          description: Filter to pilots qualified for this aircraft type
      responses:
        '200':
          description: List of available pilots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PilotResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/rules:
    get:
      operationId: getRules
      tags: [ Rules ]
      summary: List operational rules
      responses:
        '200':
          description: List of operational rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RuleResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/flights:
    get:
      operationId: displayFlights
      tags: [ Flight ]
      summary: Display flights timetable
      responses:
        '200':
          description: List of flights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FlightResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: createFlight
      tags: [ Flights ]
      summary: Create a new flight (with rule validation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFlightRequest'
      responses:
        '201':
          description: Flight created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightResponse'
        '400':
          description: Bad request (invalid payload or start >= end)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aircraft/Pilot/Airport not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Time conflict for aircraft or pilot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Rule violation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleViolationErrorResponse'

  /api/aircraft/{id}:
    put:
      operationId: updateAircraft
      tags: [ Aircraft ]
      summary: Update an aircraft in the fleet
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAircraftRequest'
      responses:
        '200':
          description: Aircraft updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AircraftResponse'
        '400':
          description: Bad request (invalid type or base, or blank registration)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aircraft not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Registration number is used by another aircraft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteAircraft
      tags: [ Aircraft ]
      summary: Delete an aircraft from the fleet
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Aircraft deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Aircraft not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Aircraft has assigned flights
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/pilots/{pilotId}:
    delete:
      tags:
        - AdminPilots
      operationId: deletePilotById
      summary: Delete pilot by id
      parameters:
        - name: pilotId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Pilot deleted successfully
        '404':
          description: Pilot not found

    patch:
      tags:
        - Pilots
      summary: Partially update a pilot
      description: Updates selected pilot fields. Fields omitted from the request body remain unchanged.
      operationId: patchPilot
      parameters:
        - name: pilotId
          in: path
          required: true
          description: Pilot ID
          schema:
            type: string
            format: uuid
          example: 0b7a9c1d-86c2-49dc-8ef8-d7f6c7e6e6f1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PilotPatchRequest'
            examples:
              updateBasicData:
                summary: Update pilot basic data
                value:
                  name: Jan
                  surname: Kowalski
                  licence: ATPL-123456
              updateOperationalBase:
                summary: Update pilot operational base
                value:
                  operationalBaseId: 2a9dfd20-90fc-4b7e-a996-358d4b5f79c7
              updateQualificationsAndAircraftTypes:
                summary: Update qualifications and aircraft types
                value:
                  qualifications:
                    - PPL
                    - CPL
                    - ATPL
                  aircraftTypes:
                    - A320
                    - B737
      responses:
        '200':
          description: Pilot updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PilotResponse'
        '400':
          description: Invalid request body
        '404':
          description: Pilot not found


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      required:
        - status
        - error
        - message
        - timestamp
        - path
      properties:
        status:
          type: integer
          description: HTTP status code
          example: 401
        error:
          type: string
          description: Error name
          example: "Unauthorized"
        message:
          type: string
          description: Human-readable error description
          example: "JWT token has expired"
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the error occurrence
        path:
          type: string
          description: Request path
          example: "/api/admin/users"

    UserInfo:
      type: object
      required:
        - username
        - email
        - roles
      properties:
        username:
          type: string
          description: Username from JWT token
          example: "admin"
        email:
          type: string
          description: User email address
          example: "admin@skyroster.local"
        roles:
          type: array
          description: List of realm roles assigned to the user
          items:
            type: string
          example: [ "operations_administrator" ]

    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Service health status
          example: "UP"

    ComplianceReport:
      type: object
      required:
        - id
        - title
        - status
      properties:
        id:
          type: string
          example: "CR-001"
        title:
          type: string
          example: "Monthly flight hours compliance"
        status:
          type: string
          example: "PASSED"

    Schedule:
      type: object
      required:
        - id
        - pilotName
        - startDateTime
        - endDateTime
      properties:
        id:
          type: string
          example: "SCH-001"
        pilotName:
          type: string
          example: "Jan Kowalski"
        startDateTime:
          type: string
          format: date-time
          example: "2026-03-20T08:00:00Z"
        endDateTime:
          type: string
          format: date-time
          example: "2026-03-20T11:00:00Z"

    PagedPilotResponse:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
        - first
        - last
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/PilotResponse'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          format: int64
          example: 42
        totalPages:
          type: integer
          example: 3
        first:
          type: boolean
          example: true
        last:
          type: boolean
          example: false

    PilotResponse:
      type: object
      required:
        - id
        - firstName
        - surname
        - homeBase
        - qualifications
      properties:
        id:
          type: string
          format: uuid
        licence:
          type: string
          example: PIL-001
        firstName:
          type: string
          example: Jan
        surname:
          type: string
          example: Kowalski
        homeBase:
          $ref: '#/components/schemas/OperationalBaseInfo'
        qualifications:
          type: array
          items:
            $ref: '#/components/schemas/PilotQualificationInfo'
        aircraftTypes:
          type: array
          items:
            $ref: '#/components/schemas/AircraftTypeInfo'

    PilotRequest:
      type: object
      required:
        - firstName
        - lastName
        - homeBase
        - qualifications
      properties:
        licence:
          type: string
          example: PIL-001
        firstName:
          type: string
          example: Jan
        lastName:
          type: string
          example: Kowalski
        homeBase:
          $ref: '#/components/schemas/OperationalBaseInfo'
        qualifications:
          type: array
          items:
            $ref: '#/components/schemas/PilotQualificationInfo'
        aircraftTypes:
          type: array
          items:
            $ref: '#/components/schemas/AircraftTypeInfo'

    PilotPatchRequest:
      type: object
      description: Request body for partially updating a pilot. Null or omitted fields are not changed.
      additionalProperties: false
      properties:
        name:
          type: string
          description: Pilot name
          example: Jan
        surname:
          type: string
          description: Pilot surname
          example: Kowalski
        licence:
          type: string
          description: Pilot licence number
          example: ATPL-123456
        operationalBaseIcaoCode:
          type: string
          description: ICAO operational base code
          example: "EPWA"
        qualifications:
          type: array
          description: Pilot qualifications. If provided, replaces the current qualification set.
          uniqueItems: true
          items:
            $ref: '#/components/schemas/PilotQualificationInfo'
        aircraftTypes:
          type: array
          description: Aircraft types assigned to the pilot. If provided, replaces the current aircraft type set.
          uniqueItems: true
          items:
            $ref: '#/components/schemas/AircraftTypeInfo'


    PilotQualificationInfo:
      type: object
      required:
        - id
        - aircraftType
        - licenseValidUntil
      properties:
        id:
          type: string
          format: uuid
        values:
          type: string
        label:
          type: string



    AddAircraftRequest:
      type: object
      required:
        - registrationNumber
        - aircraftTypeCode
        - operationalBaseCode
      properties:
        registrationNumber:
          type: string
          description: Aircraft registration number
          example: "SP-LRA"
        aircraftTypeCode:
          type: string
          description: ICAO aircraft type code
          example: "B738"
        operationalBaseCode:
          type: string
          description: ICAO operational base code
          example: "EPWA"

    UpdateAircraftRequest:
      type: object
      required:
        - registrationNumber
        - aircraftTypeCode
        - operationalBaseCode
      properties:
        registrationNumber:
          type: string
          description: Aircraft registration number
          example: "SP-LRA"
        aircraftTypeCode:
          type: string
          description: ICAO aircraft type code
          example: "B738"
        operationalBaseCode:
          type: string
          description: ICAO operational base code
          example: "EPWA"

    AircraftTypeInfo:
      type: object
      required:
        - id
        - icaoCode
        - name
      properties:
        id:
          type: string
          format: uuid
        icaoCode:
          type: string
          example: "B738"
        name:
          type: string
          example: "Boeing 737-800"

    OperationalBaseInfo:
      type: object
      required:
        - id
        - icaoCode
        - name
      properties:
        id:
          type: string
          format: uuid
        icaoCode:
          type: string
          example: "EPWA"
        name:
          type: string
          example: "Warsaw Chopin"

    AircraftResponse:
      type: object
      required:
        - id
        - registrationNumber
        - aircraftType
        - operationalBase
      properties:
        id:
          type: string
          format: uuid
        registrationNumber:
          type: string
          example: "SP-LRA"
        aircraftType:
          $ref: '#/components/schemas/AircraftTypeInfo'
        operationalBase:
          $ref: '#/components/schemas/OperationalBaseInfo'

    RuleType:
      type: string
      enum:
        - MAX_WORK_TIME
        - MIN_REST_TIME
        - MIN_FLIGHT_TIME

    RulePeriod:
      type: string
      enum:
        - DAY
        - WEEK
        - MONTH

    RuleResponse:
      type: object
      required:
        - id
        - name
        - type
        - value
        - period
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: '#/components/schemas/RuleType'
        value:
          type: integer
          minimum: 1
          description: Value in hours
        period:
          $ref: '#/components/schemas/RulePeriod'
        description:
          type: string

    FlightResponse:
      type: object
      required:
        - id
        - aircraft
        - pilot
        - flightStart
        - flightEnd
        - startAirport
        - endAirport
        - description
      properties:
        id:
          type: string
          format: uuid
        aircraft:
          $ref: '#/components/schemas/AircraftResponse'
        flightStart:
          type: string
          format: date-time
          example: "2026-06-20T08:00:00Z"
        flightEnd:
          type: string
          format: date-time
          example: "2026-06-20T11:00:00Z"
        startAirport:
          $ref: '#/components/schemas/OperationalBaseInfo'
        endAirport:
          $ref: '#/components/schemas/OperationalBaseInfo'
        description:
          type: string
          example: "Lot rejsowy Kraków - Gdańsk"

    CreateFlightRequest:
      type: object
      required:
        - aircraftId
        - pilotId
        - startDateTime
        - endDateTime
        - startAirportId
      properties:
        aircraftId:
          type: string
          format: uuid
        pilotId:
          type: string
          format: uuid
        startDateTime:
          type: string
          format: date-time
        endDateTime:
          type: string
          format: date-time
        startAirportId:
          type: string
          format: uuid
        endAirportId:
          type: string
          format: uuid
          description: Optional arrival airport
        description:
          type: string

    RuleViolation:
      type: object
      required:
        - ruleId
        - ruleName
        - ruleType
        - message
      properties:
        ruleId:
          type: string
          format: uuid
        ruleName:
          type: string
        ruleType:
          $ref: '#/components/schemas/RuleType'
        message:
          type: string

    RuleViolationErrorResponse:
      type: object
      required:
        - status
        - error
        - message
        - timestamp
        - path
        - violations
      properties:
        status:
          type: integer
          example: 422
        error:
          type: string
          example: "Unprocessable Entity"
        message:
          type: string
          example: "Cannot create flight: rule violations detected"
        timestamp:
          type: string
          format: date-time
        path:
          type: string
          example: "/api/flights"
        violations:
          type: array
          items:
            $ref: '#/components/schemas/RuleViolation'