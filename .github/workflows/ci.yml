name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Backend ---
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          cache-dependency-path: skyroster-backend/pom.xml

      - name: Backend - verify (compile + test + coverage)
        working-directory: skyroster-backend
        run: ./mvnw verify

      # --- Frontend ---
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: skyroster-frontend/package-lock.json

      - name: Frontend - install dependencies
        working-directory: skyroster-frontend
        run: npm ci

      - name: Frontend - lint
        working-directory: skyroster-frontend
        run: npx oxlint . && npx eslint .

      - name: Frontend - build
        working-directory: skyroster-frontend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t skyroster-backend ./skyroster-backend

      - name: Build frontend image
        run: docker build -t skyroster-frontend ./skyroster-frontend
