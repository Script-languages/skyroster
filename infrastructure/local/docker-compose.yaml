services:
  postgres:
    image: postgres:17
    container_name: skyroster-db
    networks:
      - skyroster-network
    profiles:
      - db
      - frontend
      - backend
      - full
    environment:
      POSTGRES_DB: ${DB_NAME:-skyroster}
      POSTGRES_USER: ${DB_USERNAME:-skyroster}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-skyroster}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-skyroster}"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: skyroster-keycloak
    networks:
      - skyroster-network
    profiles:
      - frontend
      - backend
      - full
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${DB_USERNAME:-skyroster}
      KC_DB_PASSWORD: ${DB_PASSWORD:-skyroster}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    command: start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../../skyroster-frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: skyroster-frontend
    networks:
      - skyroster-network
    profiles:
      - frontend
      - full
    ports:
      - "5173:80"
    volumes:
      - ../../skyroster-frontend:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  backend:
    build:
      context: ../../skyroster-backend
    container_name: skyroster-backend
    networks:
      - skyroster-network
    profiles:
      - backend
      - full
    ports:
      - "8001:8001"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-skyroster}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-skyroster}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-skyroster}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  pgdata:

networks:
  skyroster-network:
    driver: bridge