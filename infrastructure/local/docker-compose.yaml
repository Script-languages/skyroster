services:
  postgres:
    image: postgres:17
    container_name: skyroster-db
    profiles:
      - db
      - backend
      - full
    environment:
      POSTGRES_DB: ${DB_NAME:-skyroster}
      POSTGRES_USER: ${DB_USERNAME:-skyroster}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-skyroster}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-skyroster}"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: skyroster-keycloak
    profiles:
      - backend
      - full
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${DB_USERNAME:-skyroster}
      KC_DB_PASSWORD: ${DB_PASSWORD:-skyroster}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    command: start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: